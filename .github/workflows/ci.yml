name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-safety:
    name: Public safety
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No em dashes
        run: python3 scripts/check-no-em-dash.py
